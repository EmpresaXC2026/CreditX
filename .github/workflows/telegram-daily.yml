name: Alerta Diaria Telegram

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  enviar-alerta:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install firebase-admin
        run: npm install firebase-admin

      - name: Enviar alerta
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
        run: node -e "
          const admin = require('firebase-admin');
          const https = require('https');
          const sa = JSON.parse(process.env.FIREBASE_KEY);
          admin.initializeApp({ credential: admin.credential.cert(sa) });
          const db = admin.firestore();
          const token = process.env.TG_TOKEN;
          const chatId = process.env.TG_CHAT_ID;
          function send(text) {
            return new Promise(resolve => {
              const body = JSON.stringify({ chat_id: chatId, text, parse_mode: 'Markdown' });
              const req = https.request({ hostname: 'api.telegram.org', path: '/bot' + token + '/sendMessage', method: 'POST', headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body) } }, resolve);
              req.write(body); req.end();
            });
          }
          function getToday() { const d = new Date(); d.setHours(d.getHours() - 6); return d.toISOString().split('T')[0]; }
          function getTomorrow() { const d = new Date(); d.setHours(d.getHours() - 6); d.setDate(d.getDate() + 1); return d.toISOString().split('T')[0]; }
          (async () => {
            const snap = await db.collection('datos').doc('principal').get();
            if (!snap.exists) { await send('Sin datos en CreditX'); return; }
            const data = snap.data();
            const prestamos = data.prestamos || [];
            const pagos = data.pagos || [];
            const hoy = getToday();
            const manana = getTomorrow();
            const fechaLabel = new Date(hoy + 'T12:00:00').toLocaleDateString('es-GT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            function getSaldo(p) { const pagado = pagos.filter(pg => pg.prestamoId === p.id && !pg.soloIncumplimiento).reduce((a, pg) => a + (pg.monto || 0), 0); return (p.totalConInteres || p.monto || 0) - pagado; }
            const cobrosHoy = prestamos.filter(p => p.fechaProximoPago === hoy && p.estado !== 'Pagado');
            const cobrosManana = prestamos.filter(p => p.fechaProximoPago === manana && p.estado !== 'Pagado');
            const atrasados = prestamos.filter(p => p.fechaProximoPago < hoy && p.estado !== 'Pagado' && getSaldo(p) > 0);
            if (!cobrosHoy.length && !cobrosManana.length && !atrasados.length) { await send('CreditX - Sin cobros pendientes\n' + fechaLabel); return; }
            let msg = 'RESUMEN DEL DIA - CreditX\n' + fechaLabel + '\n\n';
            if (cobrosHoy.length) { const total = cobrosHoy.reduce((a, p) => a + (p.cuota || 0), 0); msg += 'COBRAR HOY (' + cobrosHoy.length + ')\n'; cobrosHoy.forEach((p, i) => { msg += (i+1) + '. ' + p.nombre + (p.telefono ? ' | ' + p.telefono : '') + '\n   Q ' + (p.cuota||0).toFixed(2) + ' | Saldo: Q ' + getSaldo(p).toFixed(2) + '\n'; }); msg += 'Total hoy: Q ' + total.toFixed(2) + '\n\n'; }
            if (cobrosManana.length) { const total = cobrosManana.reduce((a, p) => a + (p.cuota || 0), 0); msg += 'COBRAR MANANA (' + cobrosManana.length + ')\n'; cobrosManana.forEach((p, i) => { msg += (i+1) + '. ' + p.nombre + (p.telefono ? ' | ' + p.telefono : '') + '\n   Q ' + (p.cuota||0).toFixed(2) + ' | Saldo: Q ' + getSaldo(p).toFixed(2) + '\n'; }); msg += 'Total manana: Q ' + total.toFixed(2) + '\n\n'; }
            if (atrasados.length) { msg += 'ATRASADOS (' + atrasados.length + ')\n'; atrasados.forEach((p, i) => { msg += (i+1) + '. ' + p.nombre + ' | Saldo: Q ' + getSaldo(p).toFixed(2) + '\n'; }); }
            msg += '\nCreditX Soluciones Financieras';
            await send(msg);
            console.log('Enviado OK');
          })().catch(async e => { console.error(e); await send('Error CreditX: ' + e.message); });
          "
